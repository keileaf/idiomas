<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學中文 · Estudio de Chino Mandarín HSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3/dist/hanzi-writer.min.js"></script>
<style>
  :root{
    --paper: #F7F1E4;
    --paper-dim: #EFE7D4;
    --ink: #211C16;
    --ink-soft: #55503F;
    --muted: #8C8371;
    --seal: #AC3A2C;
    --seal-dark: #8A2E22;
    --jade: #3F6656;
    --gold: #C6A15B;
    --line: #DCD1B4;
    --card: #FFFDF6;
    --radius: 4px;
    --sidebar-w: 240px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(33,28,22,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  /* ---------- Top bar (mobile) ---------- */
  .topbar{
    display:none;
    align-items:center;
    justify-content:space-between;
    padding: 14px 18px;
    background: var(--paper-dim);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top:0;
    z-index: 30;
  }
  .topbar .brand{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:.02em;
  }
  .hamburger{
    width:34px; height:34px;
    border:1px solid var(--line);
    background:var(--card);
    border-radius:var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; cursor:pointer;
  }
  .hamburger span{ width:16px; height:2px; background:var(--ink); display:block; }

  /* ---------- Layout shell ---------- */
  .shell{
    display:flex;
    min-height:100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width: var(--sidebar-w);
    flex-shrink:0;
    background: var(--paper-dim);
    border-right: 1px solid var(--line);
    padding: 28px 16px;
    position: sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .sidebar .brand{
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:1.5rem;
    color: var(--ink);
    margin-bottom:2px;
  }
  .sidebar .brand small{
    display:block;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.66rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color: var(--muted);
    margin-top:4px;
  }
  .rule{
    height:1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin: 18px 0 16px;
  }

  .lang-switch{
    display:flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow:hidden;
    margin-bottom: 18px;
  }
  .lang-switch-btn{
    flex:1;
    border:none;
    background: var(--card);
    color: var(--muted);
    font-family:'Noto Sans SC', 'Inter', sans-serif;
    font-weight:600;
    font-size:.82rem;
    padding: 9px 6px;
    cursor:pointer;
  }
  .lang-switch-btn:first-child{ border-right: 1px solid var(--line); }
  .lang-switch-btn.active{
    background: var(--seal);
    color: #F7EFDD;
  }
  .level-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .level-btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    font-size:.92rem;
    color: var(--ink-soft);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .level-btn:hover{
    background: rgba(172,58,44,0.06);
    color: var(--ink);
  }
  .level-btn.active{
    background: var(--card);
    border-color: var(--line);
    color: var(--ink);
    font-weight:600;
  }
  .seal-tag{
    flex-shrink:0;
    width:30px; height:30px;
    border-radius:3px;
    background: var(--seal);
    color: #F7EFDD;
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:.95rem;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    transform: rotate(-1deg);
  }
  .level-btn.active .seal-tag{
    background: var(--seal-dark);
    transform: rotate(0deg);
  }
  .level-btn .count{
    margin-left:auto;
    font-size:.72rem;
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
  }

  .sidebar-footer{
    margin-top:24px;
    font-size:.72rem;
    color: var(--muted);
    line-height:1.5;
  }

  /* ---------- Main content ---------- */
  .main{
    flex:1;
    min-width:0;
    padding: 40px 48px 60px;
  }

  .level-header{
    display:flex;
    align-items:flex-end;
    gap:22px;
    margin-bottom: 6px;
  }
  .level-header .big-hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:3.6rem;
    line-height:1;
    color: var(--seal);
  }
  .level-header .titles h1{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.5rem;
  }
  .level-header .titles p{
    color: var(--muted);
    font-size:.88rem;
    margin-top:2px;
  }

  .toolbar{
    display:flex;
    gap:12px;
    align-items:center;
    margin: 26px 0 18px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:220px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding: 10px 14px 10px 36px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--card);
    font-family:'Inter', sans-serif;
    font-size:.92rem;
    color: var(--ink);
  }
  .search-box input:focus{
    outline: 2px solid var(--seal);
    outline-offset: 1px;
  }
  .search-box::before{
    content:"⌕";
    position:absolute;
    left:12px; top:50%;
    transform:translateY(-50%);
    color: var(--muted);
    font-size:1rem;
  }
  .status-pill{
    font-size:.76rem;
    color: var(--ink-soft);
    background: var(--paper-dim);
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 999px;
    white-space:nowrap;
  }

  .lang-toggle{
    display:flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow:hidden;
    flex-shrink:0;
  }
  .lang-btn{
    border:none;
    background: var(--card);
    color: var(--muted);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.76rem;
    letter-spacing:.04em;
    padding: 8px 14px;
    cursor:pointer;
    transition: background .15s ease, color .15s ease;
  }
  .lang-btn:not(:last-child){ border-right: 1px solid var(--line); }
  .lang-btn.active{
    background: var(--seal);
    color: #F7EFDD;
  }
  .lang-btn:hover:not(.active){
    background: var(--paper-dim);
    color: var(--ink);
  }

  /* ---------- Sub-nav (Vocabulario / Lecciones) ---------- */
  .subnav{
    display:flex;
    gap:6px;
    margin: 22px 0 4px;
    border-bottom: 1px solid var(--line);
  }
  .subnav-btn{
    border:none;
    background:transparent;
    padding: 10px 4px;
    margin-right: 22px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.88rem;
    color: var(--muted);
    cursor:pointer;
    position:relative;
    top:1px;
    border-bottom: 2px solid transparent;
  }
  .subnav-btn.active{
    color: var(--seal);
    border-bottom-color: var(--seal);
  }

  /* ---------- Lessons grid ---------- */
  .lessons-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap:14px;
    margin-top: 20px;
  }
  .lesson-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
    position:relative;
  }
  .lesson-card:hover{
    border-color: var(--seal);
    transform: translateY(-2px);
  }
  .lesson-card .lesson-num{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:.78rem;
    color: var(--muted);
  }
  .lesson-card h3{
    font-size:.98rem;
    margin: 6px 0 8px;
    color: var(--ink);
    line-height:1.3;
  }
  .lesson-card .lesson-meta{
    font-size:.76rem;
    color: var(--muted);
  }
  .lesson-card .lesson-check{
    position:absolute;
    top:14px; right:14px;
    width:22px; height:22px;
    border-radius:50%;
    background: var(--jade);
    color:#fff;
    font-size:.72rem;
    display:flex; align-items:center; justify-content:center;
  }
  .lessons-empty{
    padding: 50px 20px;
    text-align:center;
    color: var(--muted);
  }

  /* ---------- Matching game ---------- */
  .game-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .game-back{
    border:1px solid var(--line);
    background: var(--card);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family:'Inter', sans-serif;
    font-size:.84rem;
    cursor:pointer;
    color: var(--ink-soft);
  }
  .game-progress{
    font-size:.8rem;
    color: var(--muted);
  }
  .match-board{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items:start;
  }
  .match-col-title{
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--muted);
    margin-bottom:10px;
  }
  .match-slot{
    min-height:56px;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    background: var(--card);
    display:flex;
    align-items:center;
    padding: 8px 12px;
    margin-bottom:10px;
    gap: 10px;
    position:relative;
  }
  .match-slot .slot-hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.3rem;
    flex-shrink:0;
    width: 46px;
  }
  .match-slot.correct{
    border-style:solid;
    border-color: var(--jade);
    background: rgba(63,102,86,0.07);
  }
  .match-slot .slot-drop-target{
    flex:1;
    min-height:38px;
    border-radius: 3px;
    display:flex;
    align-items:center;
  }
  .match-slot.drag-over .slot-drop-target{
    background: rgba(172,58,44,0.08);
    outline: 1.5px dashed var(--seal);
  }
  .match-card{
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size:.86rem;
    color: var(--ink-soft);
    cursor: grab;
    user-select:none;
    touch-action: none;
    line-height:1.3;
  }
  .match-card.placed{
    cursor:default;
    background:transparent;
    border-color:transparent;
    color: var(--ink);
  }
  .match-card.dragging-ghost{
    position:fixed;
    z-index:200;
    pointer-events:none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    opacity:0.95;
  }
  .match-pool{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .shake{ animation: shake .3s ease; }
  @keyframes shake{
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }
  .lesson-complete{
    text-align:center;
    padding: 50px 20px;
  }
  .lesson-complete .big-check{
    font-size:2.6rem;
    color: var(--jade);
    margin-bottom:10px;
  }
  .lesson-complete h2{
    font-family:'Noto Serif SC', serif;
    margin-bottom:6px;
  }
  .lesson-complete p{
    color: var(--muted);
    margin-bottom:20px;
  }
  .lesson-complete button{
    border:1px solid var(--line);
    background: var(--seal);
    color:#fff;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-family:'Inter', sans-serif;
    font-weight:600;
    cursor:pointer;
  }

  @media (max-width: 640px){
    .match-board{ grid-template-columns: 1fr; gap:20px; }
  }

  /* ---------- Reading view ---------- */
  .reading-type-tag{
    display:inline-block;
    font-size:.68rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    color: var(--seal-dark);
    background: rgba(172,58,44,0.08);
    padding: 3px 8px;
    border-radius: 999px;
    margin-bottom: 8px;
  }
  .reading-controls{
    display:flex;
    gap:10px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .reading-controls button{
    border:1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size:.8rem;
    font-weight:600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor:pointer;
  }
  .reading-controls button.active{
    background: var(--seal);
    border-color: var(--seal);
    color: #F7EFDD;
  }
  .sentence-block{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor:pointer;
    transition: border-color .15s ease;
  }
  .sentence-block:hover{ border-color: var(--seal); }
  .sentence-zh{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.5rem;
    color: var(--ink);
    letter-spacing:.02em;
  }
  .sentence-reveal{
    max-height:0;
    overflow:hidden;
    transition: max-height .25s ease;
  }
  .sentence-block.revealed .sentence-reveal{
    max-height:120px;
    margin-top:10px;
  }
  .sentence-pinyin{
    font-family:'JetBrains Mono', monospace;
    color: var(--jade);
    font-size:.92rem;
    margin-bottom:4px;
  }
  .sentence-es{
    color: var(--ink-soft);
    font-size:.9rem;
  }
  .sentence-hint{
    font-size:.68rem;
    color: var(--muted);
    margin-top:2px;
  }

  /* ---------- Writing practice ---------- */
  .writing-layout{
    display:grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    margin-top: 20px;
    align-items:start;
  }
  .char-picker-title{
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--muted);
    margin-bottom:10px;
  }
  .char-chip-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    max-height: 520px;
    overflow-y:auto;
    padding-right:4px;
  }
  .char-chip{
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.15rem;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    cursor:pointer;
    color: var(--ink);
    flex-shrink:0;
  }
  .char-chip:hover{ border-color: var(--seal); }
  .char-chip.active{
    background: var(--seal);
    border-color: var(--seal);
    color: #F7EFDD;
  }
  .writing-pad{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .writing-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:16px;
    width:100%;
    justify-content:center;
  }
  .writing-controls button{
    border:1px solid var(--line);
    background: var(--paper-dim);
    color: var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size:.8rem;
    font-weight:600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor:pointer;
  }
  .writing-controls button:hover{ border-color: var(--seal); color: var(--ink); }
  .writer-target{
    background:
      repeating-linear-gradient(var(--line) 0 1px, transparent 1px 100%),
      repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 100%);
    background-size: 100% 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    touch-action: none;
  }
  .writer-info{
    margin-top:14px;
    font-size:.85rem;
    color: var(--muted);
    text-align:center;
    min-height: 20px;
  }
  .writer-info.success{ color: var(--jade); font-weight:600; }

  @media (max-width: 700px){
    .writing-layout{ grid-template-columns: 1fr; }
    .char-chip-list{ max-height:160px; }
  }

  /* ---------- Table ---------- */
  .table-wrap{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
  }
  .table-wrap.kana-grid-wrap{
    background:transparent;
    border:none;
    overflow:visible;
  }
  .kana-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
    gap:10px;
  }
  .kana-cell{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 6px 10px;
    text-align:center;
    transition: border-color .15s ease, transform .15s ease;
  }
  .kana-cell:hover{
    border-color: var(--seal);
    transform: translateY(-2px);
  }
  .kana-cell-char{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.7rem;
    color: var(--ink);
    line-height:1.1;
  }
  .kana-cell-romaji{
    font-family:'JetBrains Mono', monospace;
    color: var(--jade);
    font-size:.78rem;
    margin-top:4px;
  }
  @media (max-width: 640px){
    .kana-grid{ grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); }
    .kana-cell-char{ font-size:1.4rem; }
  }
  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--muted);
    font-weight:600;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
  }
  tbody td{
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
    font-size: .95rem;
    vertical-align: middle;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background: rgba(172,58,44,0.045); }
  td.hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.4rem;
    color: var(--ink);
    width: 90px;
  }
  td.pinyin{
    font-family:'JetBrains Mono', monospace;
    color: var(--jade);
    font-weight:500;
    width: 160px;
  }
  td.meaning{ color: var(--ink-soft); }
  td.idx{
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:.78rem;
    width:44px;
  }

  /* card layout on small screens */
  .card-row{ display:none; }

  .empty, .error, .loading{
    padding: 60px 20px;
    text-align:center;
    color: var(--muted);
  }
  .error{ color: var(--seal-dark); }
  .error pre{
    text-align:left;
    background: var(--paper-dim);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    font-size:.72rem;
    overflow:auto;
    max-height:220px;
    margin-top:14px;
    color: var(--ink-soft);
  }
  .spinner{
    width:22px; height:22px;
    border:2px solid var(--line);
    border-top-color: var(--seal);
    border-radius:50%;
    margin: 0 auto 12px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* ---------- Overlay for mobile sidebar ---------- */
  .overlay{
    display:none;
    position:fixed; inset:0;
    background: rgba(33,28,22,0.35);
    z-index:20;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px){
    .topbar{ display:flex; }
    .shell{ flex-direction:column; }
    .sidebar{
      position:fixed;
      left:0; top:0;
      height:100vh;
      transform: translateX(-102%);
      transition: transform .22s ease;
      z-index: 40;
      box-shadow: 4px 0 18px rgba(0,0,0,0.15);
    }
    .sidebar.open{ transform:translateX(0); }
    .overlay.show{ display:block; }
    .main{ padding: 24px 16px 50px; }

<script>
/* =========================================================
   CONFIGURA AQUÍ tu Web App de Google Apps Script
   ========================================================= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOLtNRfHtcGKfxEVVJXRmqPWm_lqLeH5uhR7cJadwZrSPaPboUDWV0dMU8FKmzGGbN/exec";
const SCRIPT_URL_JA = "https://script.google.com/macros/s/AKfycbydeU3pJJlzCg1BKKanGP_0fvhJG3Q61LyEnjfKCQWzPqPl7xbSAMZqspnylxx5p-OI/exec";

const HSK_LEVELS = [1,2,3,4,5,6,'7-9'];
const JA_LEVELS = ['hiragana','katakana','N5','N4','N3','N2','N1'];
// El estándar HSK 3.0 usa 7 bandas: niveles 1 a 6 individuales,
// y 7, 8 y 9 agrupados en un solo bloque "HSK 7-9" (comparten el mismo
// vocabulario avanzado, ~5,600 palabras adicionales).

let RAW_DATA = {};      // { "1": [ {hanzi, pinyin, meaning}, ... ], "2": [...], "7-9": [...] }
let LESSONS = {};       // { "1": [ {id, titulo, categoria, palabras:[...]}, ... ] }
let LECTURAS = {};      // { "1": [ {id, titulo, tipo, oraciones:[{zh,pinyin,es}]}, ... ] }
let PROGRESS = {};      // { "leccion_id": {completado, mejor_puntaje, fecha} }
let CURRENT_LEVEL = 1;
let APP_LANG = localStorage.getItem('app_lang') || 'zh'; // 'zh' | 'ja'
let CURRENT_LANG = localStorage.getItem('hsk_lang') || 'es';
let CURRENT_SUBVIEW = 'vocab'; // 'vocab' | 'lessons' | 'readings'
let ACTIVE_LESSON = null;
let ACTIVE_READING = null;
let LOAD_ERROR = null;

/* ---------------------------------------------------------
   Utilidades para detectar nombres de columnas automáticamente,
   sin importar si tu hoja usa español, inglés o pinyin en los headers.
   --------------------------------------------------------- */
const FIELD_PATTERNS = {
  character: /^(car[aá]cter|hanzi|chinese|palabra|word|字|汉字|简体)$/i,
  pinyin:    /^(pinyin|拼音)$/i,
  meaning:   /^(traducci[oó]n|significado|meaning|espa[nñ]ol|english|ingl[eé]s|意思|翻译)$/i,
  meaningEs: /^(traducci[oó]n_?es|traduccion_?espanol|traduccion_?spa|es|spanish)$/i,
  level:     /^(nivel|level|hsk|hsk_?level|等级)$/i
};

function findField(obj, patternKey){
  const pattern = FIELD_PATTERNS[patternKey];
  const keys = Object.keys(obj);
  const match = keys.find(k => pattern.test(k.trim()));
  return match ? obj[match] : undefined;
}

function normalizeLevelValue(v){
  if (v === undefined || v === null) return null;
  const s = String(v).trim().toUpperCase().replace(/^HSK\s*/,'').replace(/[_~]/g,'-');
  if (s === '7-9') return '7-9';
  const n = parseInt(s, 10);
  return isNaN(n) ? null : n;
}

/* ---------------------------------------------------------
   Normaliza la respuesta del Apps Script a nuestra forma interna,
   sin importar si viene como:
   a) Array plano de objetos con un campo de nivel
   b) Objeto { "1": [...], "2": [...] } o { "HSK1": [...], ... }
   c) Objeto envuelto en { data: [...] } o { rows: [...] }
   --------------------------------------------------------- */
function normalizeData(json){
  const result = {};
  HSK_LEVELS.forEach(l => result[l] = []);

  let arr = null;

  if (Array.isArray(json)){
    arr = json;
  } else if (json && Array.isArray(json.data)){
    arr = json.data;
  } else if (json && Array.isArray(json.rows)){
    arr = json.rows;
  } else if (json && typeof json === 'object'){
    // Puede ser objeto keyed por nivel: {"1":[...], "HSK2":[...]}
    const keys = Object.keys(json);
    const looksKeyed = keys.some(k => normalizeLevelValue(k) !== null);
    if (looksKeyed){
      keys.forEach(k => {
        const lvl = normalizeLevelValue(k);
        if (lvl && Array.isArray(json[k])){
          result[lvl] = json[k].map(rowToEntry).filter(Boolean);
        }
      });
      return result;
    }
  }

  if (arr){
    arr.forEach(row => {
      const entry = rowToEntry(row);
      if (!entry) return;
      const lvl = entry.level || normalizeLevelValue(findField(row, 'level'));
      if (lvl && result[lvl] !== undefined){
        result[lvl].push(entry);
      }
    });
    return result;
  }

  throw new Error("No se reconoció la estructura del JSON devuelto por el script.");
}

function rowToEntry(row){
  if (!row || typeof row !== 'object') return null;
  const character = findField(row, 'character');
  const pinyin = findField(row, 'pinyin');
  const meaning = findField(row, 'meaning');
  const meaningEs = findField(row, 'meaningEs');
  const level = normalizeLevelValue(findField(row, 'level'));
  if (!character && !pinyin && !meaning) return null;
  return {
    character: character ? String(character).trim() : '',
    pinyin: pinyin ? String(pinyin).trim() : '',
    meaning: meaning ? String(meaning).trim() : '',
    meaningEs: meaningEs ? String(meaningEs).trim() : '',
    level
  };
}

/* ---------------------------------------------------------
   Sidebar: construir botones de nivel
   --------------------------------------------------------- */
function getActiveLevels(){
  return APP_LANG === 'ja' ? JA_LEVELS : HSK_LEVELS;
}

function getLevelLabel(level){
  if (APP_LANG === 'ja'){
    if (level === 'hiragana') return 'Hiragana';
    if (level === 'katakana') return 'Katakana';
    return `JLPT ${level}`;
  }
  return `HSK ${level}`;
}

function getSealLabel(level){
  if (APP_LANG === 'ja'){
    if (level === 'hiragana') return 'あ';
    if (level === 'katakana') return 'ア';
    return level; // N5..N1
  }
  return level;
}

function buildSidebar(){
  const list = document.getElementById('levelList');
  list.innerHTML = '';
  getActiveLevels().forEach(level => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (String(level) === String(CURRENT_LEVEL) ? ' active' : '');
    btn.dataset.level = level;
    const sealLabel = getSealLabel(level);
    btn.innerHTML = `
      <span class="seal-tag" style="${String(sealLabel).length > 1 ? 'font-size:.68rem' : ''}">${sealLabel}</span>
      <span>${getLevelLabel(level)}</span>
      <span class="count" data-count="${level}"></span>
    `;
    btn.addEventListener('click', () => selectLevel(level));
    li.appendChild(btn);
    list.appendChild(li);
  });
  updateCounts();
}

function updateCounts(){
  document.querySelectorAll('.count').forEach(el => {
    const lvl = el.getAttribute('data-count');
    const n = (RAW_DATA[lvl] || []).length;
    el.textContent = n ? n : '';
  });
}

function selectLevel(level){
  CURRENT_LEVEL = level;
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', String(b.dataset.level) === String(level));
  });
  document.getElementById('searchInput').value = '';
  CURRENT_SUBVIEW = 'vocab';
  updateSubNav();
  renderLevel();
  closeSidebarMobile();
}

/* ---------------------------------------------------------
   Sub-nav: Vocabulario / Lecciones
   --------------------------------------------------------- */
function updateSubNav(){
  document.querySelectorAll('.subnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.subview === CURRENT_SUBVIEW);
  });
  document.getElementById('vocabView').style.display = CURRENT_SUBVIEW === 'vocab' ? '' : 'none';
  document.getElementById('lessonsView').style.display = CURRENT_SUBVIEW === 'lessons' ? '' : 'none';
  document.getElementById('readingsView').style.display = CURRENT_SUBVIEW === 'readings' ? '' : 'none';
  document.getElementById('writingView').style.display = CURRENT_SUBVIEW === 'writing' ? '' : 'none';
  document.getElementById('lessonGameView').style.display = 'none';
  document.getElementById('readingGameView').style.display = 'none';
  if (CURRENT_SUBVIEW === 'lessons') renderLessonsGrid();
  if (CURRENT_SUBVIEW === 'readings') renderReadingsGrid();
  if (CURRENT_SUBVIEW === 'writing') renderWritingView();
}

document.querySelectorAll('.subnav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    CURRENT_SUBVIEW = btn.dataset.subview;
    ACTIVE_LESSON = null;
    ACTIVE_READING = null;
    updateSubNav();
  });
});

function renderLessonsGrid(){
  const grid = document.getElementById('lessonsGrid');
  const lessons = LESSONS[CURRENT_LEVEL];

  if (!lessons || !lessons.length){
    grid.innerHTML = '';
    document.getElementById('lessonsView').innerHTML = `
      <div class="lessons-empty">
        Todavía no hay lecciones armadas para HSK ${CURRENT_LEVEL}.
        ${(APP_LANG === 'zh' && CURRENT_LEVEL == 1) ? 'Revisa que la pestaña "Lecciones_HSK1" esté en tu hoja de cálculo.' : (APP_LANG === 'ja' ? 'Las lecciones para japonés todavía no están armadas — por ahora usa Vocabulario y Escritura.' : 'Por ahora solo HSK 1 tiene lecciones — vamos agregando más niveles poco a poco.')}
      </div>`;
    return;
  }

  document.getElementById('lessonsView').innerHTML = `<div class="lessons-grid" id="lessonsGrid"></div>`;
  const freshGrid = document.getElementById('lessonsGrid');

  freshGrid.innerHTML = lessons.map(lesson => {
    const prog = PROGRESS[lesson.id];
    const done = prog && prog.completado;
    return `
      <div class="lesson-card" data-lesson-id="${lesson.id}">
        ${done ? '<div class="lesson-check">✓</div>' : ''}
        <div class="lesson-num">LECCIÓN ${lesson.id}</div>
        <h3>${escapeHtml(lesson.titulo)}</h3>
        <div class="lesson-meta">${lesson.palabras.length} palabras${prog && prog.mejor_puntaje ? ` · mejor: ${prog.mejor_puntaje}/${lesson.palabras.length}` : ''}</div>
      </div>
    `;
  }).join('');

  freshGrid.querySelectorAll('.lesson-card').forEach(card => {
    card.addEventListener('click', () => openLesson(card.dataset.lessonId));
  });
}

/* ---------------------------------------------------------
   Lecturas: diálogos, cuentos y dichos
   --------------------------------------------------------- */
const TIPO_LABELS = { dialogo: 'Diálogo', cuento: 'Cuento', refran: 'Dicho popular' };

function renderReadingsGrid(){
  const readings = LECTURAS[CURRENT_LEVEL];
  const view = document.getElementById('readingsView');

  if (!readings || !readings.length){
    view.innerHTML = `
      <div class="lessons-empty">
        Todavía no hay lecturas para HSK ${CURRENT_LEVEL}.
        ${(APP_LANG === 'zh' && CURRENT_LEVEL == 1) ? 'Revisa que la pestaña "Lecturas_HSK1" esté en tu hoja de cálculo.' : (APP_LANG === 'ja' ? 'Las lecturas para japonés todavía no están armadas — por ahora usa Vocabulario y Escritura.' : 'Por ahora solo HSK 1 tiene lecturas.')}
      </div>`;
    return;
  }

  view.innerHTML = `<div class="lessons-grid" id="readingsGrid"></div>`;
  const grid = document.getElementById('readingsGrid');

  grid.innerHTML = readings.map(r => `
    <div class="lesson-card" data-reading-id="${r.id}">
      <div class="lesson-num">${(TIPO_LABELS[r.tipo] || 'Lectura').toUpperCase()}</div>
      <h3>${escapeHtml(r.titulo)}</h3>
      <div class="lesson-meta">${r.oraciones.length} ${r.oraciones.length === 1 ? 'oración' : 'oraciones'}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.lesson-card').forEach(card => {
    card.addEventListener('click', () => openReading(card.dataset.readingId));
  });
}

function openReading(readingId){
  const readings = LECTURAS[CURRENT_LEVEL] || [];
  const reading = readings.find(r => String(r.id) === String(readingId));
  if (!reading) return;
  ACTIVE_READING = reading;

  document.getElementById('readingsView').style.display = 'none';
  document.getElementById('readingGameView').style.display = '';
  renderReadingView(reading);
}

function renderReadingView(reading){
  const container = document.getElementById('readingGameView');

  container.innerHTML = `
    <div class="game-header">
      <button class="game-back" id="readingBackBtn">← Volver a lecturas</button>
    </div>
    <div class="reading-type-tag">${escapeHtml(TIPO_LABELS[reading.tipo] || 'Lectura')}</div>
    <h2 style="font-family:'Noto Serif SC',serif;margin-bottom:6px;">${escapeHtml(reading.titulo)}</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:6px;">Toca cada oración para revelar el pinyin y la traducción.</p>
    <div class="reading-controls">
      <button id="revealAllBtn">Revelar todo</button>
      <button id="hideAllBtn">Ocultar todo</button>
    </div>
    <div id="sentencesContainer"></div>
  `;

  document.getElementById('readingBackBtn').addEventListener('click', () => {
    ACTIVE_READING = null;
    container.style.display = 'none';
    document.getElementById('readingsView').style.display = '';
    renderReadingsGrid();
  });

  const sentencesContainer = document.getElementById('sentencesContainer');
  sentencesContainer.innerHTML = reading.oraciones.map((o, i) => `
    <div class="sentence-block" data-index="${i}">
      <div class="sentence-zh">${escapeHtml(o.zh)}</div>
      <div class="sentence-hint">toca para ver pinyin y traducción</div>
      <div class="sentence-reveal">
        <div class="sentence-pinyin">${escapeHtml(o.pinyin)}</div>
        <div class="sentence-es">${escapeHtml(o.es)}</div>
      </div>
    </div>
  `).join('');

  sentencesContainer.querySelectorAll('.sentence-block').forEach(block => {
    block.addEventListener('click', () => block.classList.toggle('revealed'));
  });

  document.getElementById('revealAllBtn').addEventListener('click', () => {
    sentencesContainer.querySelectorAll('.sentence-block').forEach(b => b.classList.add('revealed'));
  });
  document.getElementById('hideAllBtn').addEventListener('click', () => {
    sentencesContainer.querySelectorAll('.sentence-block').forEach(b => b.classList.remove('revealed'));
  });
}

/* ---------------------------------------------------------
   Escritura: practicar trazos con mouse/touch (HanziWriter)
   --------------------------------------------------------- */
let WRITER_INSTANCE = null;
let WRITING_CHARS = [];
let WRITING_ACTIVE_CHAR = null;

function getUniqueCharsForLevel(level){
  const words = RAW_DATA[level] || [];
  const seen = new Set();
  const chars = [];
  const isKanaLevel = (level === 'hiragana' || level === 'katakana');
  const pattern = isKanaLevel ? /[\u3040-\u30ff]/ : /[\u4e00-\u9fff]/;
  words.forEach(w => {
    for (const ch of w.character){
      if (pattern.test(ch) && !seen.has(ch)){
        seen.add(ch);
        chars.push(ch);
      }
    }
  });
  return chars;
}

function renderWritingView(){
  WRITING_CHARS = getUniqueCharsForLevel(CURRENT_LEVEL);
  const chipList = document.getElementById('charChipList');

  if (!WRITING_CHARS.length){
    chipList.innerHTML = '';
    document.getElementById('writerInfo').textContent = 'No hay caracteres cargados todavía para este nivel.';
    return;
  }

  chipList.innerHTML = WRITING_CHARS.map(ch => `
    <div class="char-chip" data-char="${ch}">${ch}</div>
  `).join('');

  chipList.querySelectorAll('.char-chip').forEach(chip => {
    chip.addEventListener('click', () => selectWritingChar(chip.dataset.char));
  });

  if (!WRITING_ACTIVE_CHAR || !WRITING_CHARS.includes(WRITING_ACTIVE_CHAR)){
    selectWritingChar(WRITING_CHARS[0]);
  } else {
    selectWritingChar(WRITING_ACTIVE_CHAR);
  }
}

function selectWritingChar(char){
  WRITING_ACTIVE_CHAR = char;
  document.querySelectorAll('.char-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.char === char);
  });

  const target = document.getElementById('writerTarget');
  const info = document.getElementById('writerInfo');
  target.innerHTML = '';
  info.classList.remove('success');

  const isKanaLevel = (CURRENT_LEVEL === 'hiragana' || CURRENT_LEVEL === 'katakana');
  if (isKanaLevel){
    renderKanaTraceCanvas(char, target, info);
  } else {
    renderHanziQuiz(char, target, info);
  }
}

/**
 * Trazo libre guiado para kana: dibuja el carácter como referencia tenue
 * de fondo y deja que el usuario lo repase encima con mouse/touch.
 * A diferencia de los kanji, aquí NO hay calificación automática — la
 * librería que usamos para eso solo tiene datos de trazos para hanzi/kanji,
 * no para hiragana/katakana.
 */
function renderKanaTraceCanvas(char, target, info){
  const size = Math.min(320, target.parentElement.clientWidth - 40, 320);
  target.innerHTML = `<canvas id="kanaCanvas" width="${size}" height="${size}" style="touch-action:none; display:block;"></canvas>`;
  const canvas = document.getElementById('kanaCanvas');
  const ctx = canvas.getContext('2d');

  function drawGuide(){
    ctx.clearRect(0, 0, size, size);
    ctx.fillStyle = 'rgba(140, 131, 113, 0.28)';
    ctx.font = `${size * 0.7}px "Noto Sans SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(char, size / 2, size / 2 + size * 0.03);
  }
  drawGuide();

  ctx.strokeStyle = '#AC3A2C';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  canvas.addEventListener('pointerdown', (e) => {
    drawing = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
    canvas.addEventListener(evt, () => { drawing = false; });
  });

  info.innerHTML = `Repasa <strong>"${char}"</strong> con el mouse o el dedo sobre la guía. <span style="color:var(--muted)">(Aquí no hay calificación automática — es práctica de trazo libre.)</span>`;

  // botón "Ver trazos" no aplica en modo kana; lo reusamos como "limpiar"
  document.getElementById('showStrokesBtn').onclick = () => drawGuide();
  document.getElementById('retryQuizBtn').onclick = () => selectWritingChar(char);
}

/**
 * Modo kanji/hanzi (HSK y JLPT): usa HanziWriter, que sí valida cada
 * trazo contra la forma correcta.
 * Nota para japonés: muchos kanji comparten forma con su equivalente en
 * chino simplificado, pero algunos difieren (shinjitai) — en esos casos
 * el trazo de referencia puede no ser exacto.
 */
function renderHanziQuiz(char, target, info){
  info.textContent = 'Cargando carácter...';

  if (typeof HanziWriter === 'undefined'){
    info.textContent = 'No se pudo cargar la librería de escritura (revisa tu conexión) — intenta recargar la página.';
    return;
  }

  const size = Math.min(320, target.parentElement.clientWidth - 40, 320);

  try{
    WRITER_INSTANCE = HanziWriter.create('writerTarget', char, {
      width: size,
      height: size,
      padding: 10,
      showOutline: true,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 200,
      highlightOnComplete: true
    });

    info.textContent = 'Dibuja cada trazo con el mouse o el dedo, en orden.';
    let strokesDone = 0;

    WRITER_INSTANCE.quiz({
      onCorrectStroke: () => { strokesDone++; },
      onComplete: (summary) => {
        const totalStrokes = strokesDone || 1;
        const precision = Math.round((totalStrokes / (totalStrokes + summary.totalMistakes)) * 100);
        const grade = precision >= 95 ? 'A' : precision >= 85 ? 'B' : precision >= 70 ? 'C' : 'D';

        info.innerHTML = `¡Completaste "${char}"! <strong>${precision}% de precisión</strong> (calificación ${grade}) — ${summary.totalMistakes} error${summary.totalMistakes === 1 ? '' : 'es'} en ${totalStrokes} trazo${totalStrokes === 1 ? '' : 's'}.`;
        info.classList.add('success');

        guardarEscrituraRemota(char, precision, grade, summary.totalMistakes, totalStrokes);
      }
    });

    document.getElementById('showStrokesBtn').onclick = () => WRITER_INSTANCE.animateCharacter();
    document.getElementById('retryQuizBtn').onclick = () => selectWritingChar(char);
  } catch(err){
    info.textContent = `No se encontraron datos de trazos para "${char}".`;
  }
}

async function guardarEscrituraRemota(caracter, precision, grade, errores, trazos){
  try{
    const url = APP_LANG === 'ja' ? SCRIPT_URL_JA : SCRIPT_URL;
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        accion: 'guardar_escritura',
        caracter, precision, grade, errores, trazos,
        nivel: CURRENT_LEVEL
      })
    });
  } catch(err){
    console.warn('No se pudo guardar el resultado de escritura en la hoja:', err);
  }
}

document.getElementById('randomCharBtn').addEventListener('click', () => {

  const pick = other.length ? other[Math.floor(Math.random() * other.length)] : WRITING_CHARS[0];

});

/* ---------------------------------------------------------
   Juego de arrastrar y emparejar
   --------------------------------------------------------- */
function shuffle(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function openLesson(lessonId){
  const lessons = LESSONS[CURRENT_LEVEL] || [];
  const lesson = lessons.find(l => String(l.id) === String(lessonId));
  if (!lesson) return;
  ACTIVE_LESSON = lesson;

  document.getElementById('lessonsView').style.display = 'none';
  document.getElementById('lessonGameView').style.display = '';
  renderMatchingGame(lesson);
}

function renderMatchingGame(lesson){
  const container = document.getElementById('lessonGameView');
  const palabras = lesson.palabras;
  const shuffledCards = shuffle(palabras.map((w, i) => ({ ...w, originalIndex: i })));

  container.innerHTML = `
    <div class="game-header">
      <button class="game-back" id="gameBackBtn">← Volver a lecciones</button>
      <div class="game-progress" id="gameProgress">0 de ${palabras.length} emparejadas</div>
    </div>
    <h2 style="font-family:'Noto Serif SC',serif;margin-bottom:4px;">${escapeHtml(lesson.titulo)}</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:20px;">Arrastra cada tarjeta con el pinyin y significado hacia su carácter correspondiente.</p>
    <div class="match-board">
      <div>
        <div class="match-col-title">Caracteres</div>
        <div id="slotsContainer"></div>
      </div>
      <div>
        <div class="match-col-title">Pinyin y significado</div>
        <div class="match-pool" id="poolContainer"></div>
      </div>
    </div>
  `;

  document.getElementById('gameBackBtn').addEventListener('click', () => {
    ACTIVE_LESSON = null;
    document.getElementById('lessonGameView').style.display = 'none';
    document.getElementById('lessonsView').style.display = '';
    renderLessonsGrid();
  });

  const slotsContainer = document.getElementById('slotsContainer');
  slotsContainer.innerHTML = palabras.map((w, i) => `
    <div class="match-slot" data-index="${i}">
      <div class="slot-hanzi">${escapeHtml(w.caracter)}</div>
      <div class="slot-drop-target" data-index="${i}"></div>
    </div>
  `).join('');

  const poolContainer = document.getElementById('poolContainer');
  poolContainer.innerHTML = shuffledCards.map(w => `
    <div class="match-card" data-index="${w.originalIndex}">
      <strong>${escapeHtml(w.pinyin)}</strong> — ${escapeHtml(w.significado)}
    </div>
  `).join('');

  let matchedCount = 0;
  let attempts = 0;
  const total = palabras.length;

  setupDragAndDrop(poolContainer, slotsContainer, (cardIndex, slotIndex, cardEl, slotEl) => {
    attempts++;
    if (cardIndex === slotIndex){
      const dropTarget = slotEl.querySelector('.slot-drop-target');
      cardEl.classList.add('placed');
      cardEl.style.cursor = 'default';
      cardEl.setAttribute('draggable', 'false');
      dropTarget.appendChild(cardEl);
      slotEl.classList.add('correct');
      matchedCount++;
      document.getElementById('gameProgress').textContent = `${matchedCount} de ${total} emparejadas`;

      if (matchedCount === total){
        const puntaje = Math.max(0, total - Math.max(0, attempts - total));
        setTimeout(() => showLessonComplete(lesson, puntaje, total), 350);
      }
      return true; // aceptar
    } else {
      slotEl.classList.add('shake');
      setTimeout(() => slotEl.classList.remove('shake'), 300);
      return false; // rechazar, la tarjeta regresa
    }
  });
}

function showLessonComplete(lesson, puntaje, total){
  const container = document.getElementById('lessonGameView');
  container.innerHTML = `
    <div class="lesson-complete">
      <div class="big-check">✓</div>
      <h2>¡Lección completada!</h2>
      <p>${escapeHtml(lesson.titulo)} — ${puntaje} de ${total} puntos</p>
      <button id="backToLessonsBtn">Volver a lecciones</button>
    </div>
  `;
  document.getElementById('backToLessonsBtn').addEventListener('click', () => {
    ACTIVE_LESSON = null;
    container.style.display = 'none';
    document.getElementById('lessonsView').style.display = '';
    renderLessonsGrid();
  });

  PROGRESS[lesson.id] = {
    completado: true,
    mejor_puntaje: Math.max(puntaje, (PROGRESS[lesson.id] && PROGRESS[lesson.id].mejor_puntaje) || 0),
    fecha: new Date().toISOString()
  };
  guardarProgresoRemoto(lesson.id, true, puntaje);
}

async function guardarProgresoRemoto(leccionId, completado, puntaje){
  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita el preflight de CORS
      body: JSON.stringify({ accion: 'guardar_progreso', leccion_id: leccionId, completado, puntaje })
    });
  } catch(err){
    console.warn('No se pudo guardar el progreso en la hoja:', err);
  }
}

/**
 * Drag & drop con Pointer Events (funciona con mouse y con touch por igual).
 * onDrop(cardIndex, slotIndex, cardEl, slotEl) debe devolver true/false.
 */
function setupDragAndDrop(poolContainer, slotsContainer, onDrop){
  let dragEl = null;
  let ghost = null;
  let originParent = null;
  let offsetX = 0, offsetY = 0;

  function pointerDown(e){
    const card = e.target.closest('.match-card');
    if (!card || card.classList.contains('placed')) return;
    e.preventDefault();
    dragEl = card;
    originParent = card.parentElement;

    const rect = card.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    ghost = card.cloneNode(true);
    ghost.classList.add('dragging-ghost');
    ghost.style.width = rect.width + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);
    card.style.opacity = '0.3';

    document.addEventListener('pointermove', pointerMove);
    document.addEventListener('pointerup', pointerUp);
  }

  function pointerMove(e){
    if (!ghost) return;
    ghost.style.left = (e.clientX - offsetX) + 'px';
    ghost.style.top = (e.clientY - offsetY) + 'px';
  }

  function pointerUp(e){
    document.removeEventListener('pointermove', pointerMove);
    document.removeEventListener('pointerup', pointerUp);
    if (!ghost) return;

    ghost.style.display = 'none';
    const dropEl = document.elementFromPoint(e.clientX, e.clientY);
    ghost.remove();
    ghost = null;

    if (dragEl) dragEl.style.opacity = '';

    const slotTarget = dropEl ? dropEl.closest('.match-slot') : null;

    if (slotTarget && dragEl){
      const cardIndex = Number(dragEl.dataset.index);
      const slotIndex = Number(slotTarget.dataset.index);
      const accepted = onDrop(cardIndex, slotIndex, dragEl, slotTarget);
      if (!accepted){
        originParent.appendChild(dragEl);
      }
    }
    dragEl = null;
  }

  poolContainer.addEventListener('pointerdown', pointerDown);
  slotsContainer.addEventListener('pointerdown', (e) => {
    // permite re-arrastrar una tarjeta ya colocada mal (por si acaso)
    pointerDown(e);
  });
}

/* ---------------------------------------------------------
   Render de tabla
   --------------------------------------------------------- */
const SAMPLE_HANZI = {1:'一',2:'二',3:'三',4:'四',5:'五',6:'六','7-9':'高'};

function renderLevel(){
  const words = RAW_DATA[CURRENT_LEVEL] || [];
  document.getElementById('bigHanzi').textContent = APP_LANG === 'ja'
    ? getSealLabel(CURRENT_LEVEL)
    : (SAMPLE_HANZI[CURRENT_LEVEL] || CURRENT_LEVEL);
  document.getElementById('levelTitle').textContent = getLevelLabel(CURRENT_LEVEL);
  document.getElementById('levelSubtitle').textContent =
    words.length ? `${words.length} palabras en este nivel` : 'Sin datos para este nivel todavía';

  renderTable(words);
}

function getMeaning(w){
  if (CURRENT_LANG === 'es' && w.meaningEs) return w.meaningEs;
  if (CURRENT_LANG === 'es' && !w.meaningEs) return w.meaning; // aún no traducido, cae a inglés
  return w.meaning;
}

function renderTable(words){
  const wrap = document.getElementById('tableWrap');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = query
    ? words.filter(w =>
        w.character.toLowerCase().includes(query) ||
        w.pinyin.toLowerCase().includes(query) ||
        w.meaning.toLowerCase().includes(query) ||
        (w.meaningEs && w.meaningEs.toLowerCase().includes(query)))
    : words;

  document.getElementById('statusPill').textContent =
    `${filtered.length} de ${words.length} palabras`;

  if (!filtered.length){
    wrap.innerHTML = `<div class="empty">No se encontraron resultados para este nivel.</div>`;
    return;
  }

  const isKanaLevel = APP_LANG === 'ja' && (CURRENT_LEVEL === 'hiragana' || CURRENT_LEVEL === 'katakana');
  if (isKanaLevel){
    renderKanaGrid(filtered, wrap);
    return;
  }

  const rows = filtered.map((w, i) => {
    const pendingEs = CURRENT_LANG === 'es' && !w.meaningEs;
    return `
    <tr>
      <td class="idx">${i + 1}</td>
      <td class="hanzi">${escapeHtml(w.character)}</td>
      <td class="pinyin">${escapeHtml(w.pinyin)}</td>
      <td class="meaning">${escapeHtml(getMeaning(w))}${pendingEs ? ' <span style="color:var(--muted);font-size:.72rem">(en)</span>' : ''}</td>
    </tr>
  `;
  }).join('');

  wrap.classList.remove('kana-grid-wrap');
  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Carácter</th>
          <th>${APP_LANG === 'ja' ? 'Romaji' : 'Pinyin'}</th>
          <th>Traducción</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/**
 * Vista de cuadrícula para Hiragana/Katakana — más práctica que una tabla
 * larga para un silabario de ~104 caracteres.
 */
function renderKanaGrid(words, wrap){
  wrap.classList.add('kana-grid-wrap');
  wrap.innerHTML = `
    <div class="kana-grid">
      ${words.map(w => `
        <div class="kana-cell">
          <div class="kana-cell-char">${escapeHtml(w.character)}</div>
          <div class="kana-cell-romaji">${escapeHtml(w.pinyin)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---------------------------------------------------------
   Carga de datos
   --------------------------------------------------------- */
async function loadData(){
  try{
    const url = APP_LANG === 'ja' ? SCRIPT_URL_JA : SCRIPT_URL;
    const res = await fetch(url, { method: 'GET' });
    if (!res.ok) throw new Error(`El script respondió con estado ${res.status}`);
    const json = await res.json();

    if (APP_LANG === 'ja'){
      RAW_DATA = normalizeJapaneseData(json && json.vocabulario ? json.vocabulario : {});
      LESSONS = {};
      LECTURAS = {};
    } else {
      // Compatibilidad: si el script todavía es la versión vieja (sin
      // envoltura vocabulario/lecciones), lo tratamos como solo vocabulario.
      const vocabJson = json && json.vocabulario ? json.vocabulario : json;
      RAW_DATA = normalizeData(vocabJson);
      LESSONS = (json && json.lecciones) ? json.lecciones : {};
      LECTURAS = (json && json.lecturas) ? json.lecturas : {};
    }
    PROGRESS = (json && json.progreso) ? json.progreso : {};

    updateCounts();
    renderLevel();
  } catch(err){
    LOAD_ERROR = err;
    showLoadError(err);
  }
}

/**
 * Convierte la respuesta del script de japonés (hiragana/katakana con
 * caracter+romaji, y JLPT_N5...N1 con caracter+romaji+traduccion) a la
 * misma forma interna que usa el resto de la página: {character, pinyin,
 * meaning, meaningEs, level}
 */
function normalizeJapaneseData(vocab){
  const result = {};
  JA_LEVELS.forEach(level => {
    const rows = vocab[level] || [];
    result[level] = rows.map(r => ({
      character: r.caracter || '',
      pinyin: r.romaji || '',
      meaning: r.traduccion || '',
      meaningEs: r.traduccion_es || '',
      level
    }));
  });
  return result;
}

function showLoadError(err){
  const wrap = document.getElementById('tableWrap');
  document.getElementById('levelSubtitle').textContent = 'No se pudieron cargar los datos';
  document.getElementById('statusPill').textContent = 'Error de carga';
  wrap.innerHTML = `
    <div class="error">
      <strong>No pude leer el vocabulario desde tu script.</strong>
      <p style="margin-top:8px;font-size:.85rem;color:var(--ink-soft)">
        Revisa que la Web App esté publicada con acceso "Cualquier usuario", y que
        el <code>doGet()</code> devuelva JSON con <code>ContentService</code>
        (no HTML). Detalle técnico:
      </p>
      <pre>${escapeHtml(err.message || err)}</pre>
    </div>
  `;
}
