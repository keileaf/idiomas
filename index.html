<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學中文 · Estudio de Chino Mandarín HSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F7F1E4;
    --paper-dim: #EFE7D4;
    --ink: #211C16;
    --ink-soft: #55503F;
    --muted: #8C8371;
    --seal: #AC3A2C;
    --seal-dark: #8A2E22;
    --jade: #3F6656;
    --gold: #C6A15B;
    --line: #DCD1B4;
    --card: #FFFDF6;
    --radius: 4px;
    --sidebar-w: 240px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(33,28,22,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  /* ---------- Top bar (mobile) ---------- */
  .topbar{
    display:none;
    align-items:center;
    justify-content:space-between;
    padding: 14px 18px;
    background: var(--paper-dim);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top:0;
    z-index: 30;
  }
  .topbar .brand{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:.02em;
  }
  .hamburger{
    width:34px; height:34px;
    border:1px solid var(--line);
    background:var(--card);
    border-radius:var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; cursor:pointer;
  }
  .hamburger span{ width:16px; height:2px; background:var(--ink); display:block; }

  /* ---------- Layout shell ---------- */
  .shell{
    display:flex;
    min-height:100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width: var(--sidebar-w);
    flex-shrink:0;
    background: var(--paper-dim);
    border-right: 1px solid var(--line);
    padding: 28px 16px;
    position: sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .sidebar .brand{
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:1.5rem;
    color: var(--ink);
    margin-bottom:2px;
  }
  .sidebar .brand small{
    display:block;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.66rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color: var(--muted);
    margin-top:4px;
  }
  .rule{
    height:1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin: 18px 0 16px;
  }
  .level-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .level-btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    font-size:.92rem;
    color: var(--ink-soft);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .level-btn:hover{
    background: rgba(172,58,44,0.06);
    color: var(--ink);
  }
  .level-btn.active{
    background: var(--card);
    border-color: var(--line);
    color: var(--ink);
    font-weight:600;
  }
  .seal-tag{
    flex-shrink:0;
    width:30px; height:30px;
    border-radius:3px;
    background: var(--seal);
    color: #F7EFDD;
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:.95rem;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    transform: rotate(-1deg);
  }
  .level-btn.active .seal-tag{
    background: var(--seal-dark);
    transform: rotate(0deg);
  }
  .level-btn .count{
    margin-left:auto;
    font-size:.72rem;
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
  }

  .sidebar-footer{
    margin-top:24px;
    font-size:.72rem;
    color: var(--muted);
    line-height:1.5;
  }

  /* ---------- Main content ---------- */
  .main{
    flex:1;
    min-width:0;
    padding: 40px 48px 60px;
  }

  .level-header{
    display:flex;
    align-items:flex-end;
    gap:22px;
    margin-bottom: 6px;
  }
  .level-header .big-hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:3.6rem;
    line-height:1;
    color: var(--seal);
  }
  .level-header .titles h1{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.5rem;
  }
  .level-header .titles p{
    color: var(--muted);
    font-size:.88rem;
    margin-top:2px;
  }

  .toolbar{
    display:flex;
    gap:12px;
    align-items:center;
    margin: 26px 0 18px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:220px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding: 10px 14px 10px 36px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--card);
    font-family:'Inter', sans-serif;
    font-size:.92rem;
    color: var(--ink);
  }
  .search-box input:focus{
    outline: 2px solid var(--seal);
    outline-offset: 1px;
  }
  .search-box::before{
    content:"⌕";
    position:absolute;
    left:12px; top:50%;
    transform:translateY(-50%);
    color: var(--muted);
    font-size:1rem;
  }
  .status-pill{
    font-size:.76rem;
    color: var(--ink-soft);
    background: var(--paper-dim);
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 999px;
    white-space:nowrap;
  }

  .lang-toggle{
    display:flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow:hidden;
    flex-shrink:0;
  }
  .lang-btn{
    border:none;
    background: var(--card);
    color: var(--muted);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.76rem;
    letter-spacing:.04em;
    padding: 8px 14px;
    cursor:pointer;
    transition: background .15s ease, color .15s ease;
  }
  .lang-btn:not(:last-child){ border-right: 1px solid var(--line); }
  .lang-btn.active{
    background: var(--seal);
    color: #F7EFDD;
  }
  .lang-btn:hover:not(.active){
    background: var(--paper-dim);
    color: var(--ink);
  }

  /* ---------- Sub-nav (Vocabulario / Lecciones) ---------- */
  .subnav{
    display:flex;
    gap:6px;
    margin: 22px 0 4px;
    border-bottom: 1px solid var(--line);
  }
  .subnav-btn{
    border:none;
    background:transparent;
    padding: 10px 4px;
    margin-right: 22px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:.88rem;
    color: var(--muted);
    cursor:pointer;
    position:relative;
    top:1px;
    border-bottom: 2px solid transparent;
  }
  .subnav-btn.active{
    color: var(--seal);
    border-bottom-color: var(--seal);
  }

  /* ---------- Lessons grid ---------- */
  .lessons-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap:14px;
    margin-top: 20px;
  }
  .lesson-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
    position:relative;
  }
  .lesson-card:hover{
    border-color: var(--seal);
    transform: translateY(-2px);
  }
  .lesson-card .lesson-num{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:.78rem;
    color: var(--muted);
  }
  .lesson-card h3{
    font-size:.98rem;
    margin: 6px 0 8px;
    color: var(--ink);
    line-height:1.3;
  }
  .lesson-card .lesson-meta{
    font-size:.76rem;
    color: var(--muted);
  }
  .lesson-card .lesson-check{
    position:absolute;
    top:14px; right:14px;
    width:22px; height:22px;
    border-radius:50%;
    background: var(--jade);
    color:#fff;
    font-size:.72rem;
    display:flex; align-items:center; justify-content:center;
  }
  .lessons-empty{
    padding: 50px 20px;
    text-align:center;
    color: var(--muted);
  }

  /* ---------- Matching game ---------- */
  .game-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .game-back{
    border:1px solid var(--line);
    background: var(--card);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family:'Inter', sans-serif;
    font-size:.84rem;
    cursor:pointer;
    color: var(--ink-soft);
  }
  .game-progress{
    font-size:.8rem;
    color: var(--muted);
  }
  .match-board{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items:start;
  }
  .match-col-title{
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--muted);
    margin-bottom:10px;
  }
  .match-slot{
    min-height:56px;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    background: var(--card);
    display:flex;
    align-items:center;
    padding: 8px 12px;
    margin-bottom:10px;
    gap: 10px;
    position:relative;
  }
  .match-slot .slot-hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.3rem;
    flex-shrink:0;
    width: 46px;
  }
  .match-slot.correct{
    border-style:solid;
    border-color: var(--jade);
    background: rgba(63,102,86,0.07);
  }
  .match-slot .slot-drop-target{
    flex:1;
    min-height:38px;
    border-radius: 3px;
    display:flex;
    align-items:center;
  }
  .match-slot.drag-over .slot-drop-target{
    background: rgba(172,58,44,0.08);
    outline: 1.5px dashed var(--seal);
  }
  .match-card{
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size:.86rem;
    color: var(--ink-soft);
    cursor: grab;
    user-select:none;
    touch-action: none;
    line-height:1.3;
  }
  .match-card.placed{
    cursor:default;
    background:transparent;
    border-color:transparent;
    color: var(--ink);
  }
  .match-card.dragging-ghost{
    position:fixed;
    z-index:200;
    pointer-events:none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    opacity:0.95;
  }
  .match-pool{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .shake{ animation: shake .3s ease; }
  @keyframes shake{
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }
  .lesson-complete{
    text-align:center;
    padding: 50px 20px;
  }
  .lesson-complete .big-check{
    font-size:2.6rem;
    color: var(--jade);
    margin-bottom:10px;
  }
  .lesson-complete h2{
    font-family:'Noto Serif SC', serif;
    margin-bottom:6px;
  }
  .lesson-complete p{
    color: var(--muted);
    margin-bottom:20px;
  }
  .lesson-complete button{
    border:1px solid var(--line);
    background: var(--seal);
    color:#fff;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-family:'Inter', sans-serif;
    font-weight:600;
    cursor:pointer;
  }

  @media (max-width: 640px){
    .match-board{ grid-template-columns: 1fr; gap:20px; }
  }

  /* ---------- Table ---------- */
  .table-wrap{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
  }
  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--muted);
    font-weight:600;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
  }
  tbody td{
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
    font-size: .95rem;
    vertical-align: middle;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background: rgba(172,58,44,0.045); }
  td.hanzi{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:1.4rem;
    color: var(--ink);
    width: 90px;
  }
  td.pinyin{
    font-family:'JetBrains Mono', monospace;
    color: var(--jade);
    font-weight:500;
    width: 160px;
  }
  td.meaning{ color: var(--ink-soft); }
  td.idx{
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:.78rem;
    width:44px;
  }

  /* card layout on small screens */
  .card-row{ display:none; }

  .empty, .error, .loading{
    padding: 60px 20px;
    text-align:center;
    color: var(--muted);
  }
  .error{ color: var(--seal-dark); }
  .error pre{
    text-align:left;
    background: var(--paper-dim);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    font-size:.72rem;
    overflow:auto;
    max-height:220px;
    margin-top:14px;
    color: var(--ink-soft);
  }
  .spinner{
    width:22px; height:22px;
    border:2px solid var(--line);
    border-top-color: var(--seal);
    border-radius:50%;
    margin: 0 auto 12px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* ---------- Overlay for mobile sidebar ---------- */
  .overlay{
    display:none;
    position:fixed; inset:0;
    background: rgba(33,28,22,0.35);
    z-index:20;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px){
    .topbar{ display:flex; }
    .shell{ flex-direction:column; }
    .sidebar{
      position:fixed;
      left:0; top:0;
      height:100vh;
      transform: translateX(-102%);
      transition: transform .22s ease;
      z-index: 40;
      box-shadow: 4px 0 18px rgba(0,0,0,0.15);
    }
    .sidebar.open{ transform:translateX(0); }
    .overlay.show{ display:block; }
    .main{ padding: 24px 16px 50px; }
    .level-header .big-hanzi{ font-size:2.6rem; }
    .level-header .titles h1{ font-size:1.2rem; }

    thead{ display:none; }
    table, tbody, tr, td{ display:block; width:100%; }
    tbody tr{
      border-bottom: 1px solid var(--line);
      padding: 12px 4px;
      display:flex;
      align-items:center;
      gap:14px;
    }
    tbody tr:hover{ background:none; }
    td{ border:none !important; padding: 0 !important; }
    td.idx{ display:none; }
    td.hanzi{ width:auto; flex-shrink:0; }
    td.pinyin{ width:auto; flex-shrink:0; min-width:88px; }
    td.meaning{ flex:1; font-size:.88rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">學中文 <span style="font-weight:400;font-size:.8rem;color:var(--muted)">HSK</span></div>
  <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú de niveles">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="overlay" id="overlay"></div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">學中文<small>Vocabulario HSK 3.0</small></div>
    <div class="rule"></div>
    <ul class="level-list" id="levelList">
      <!-- Se llenan por JS: HSK 1 al 9 -->
    </ul>
    <div class="sidebar-footer">
      Datos desde tu hoja de cálculo de Google, vía Apps Script.
    </div>
  </aside>

  <main class="main">
    <div class="level-header">
      <div class="big-hanzi" id="bigHanzi">一</div>
      <div class="titles">
        <h1 id="levelTitle">HSK 1</h1>
        <p id="levelSubtitle">Cargando vocabulario…</p>
      </div>
    </div>

    <div class="subnav" id="subNav">
      <button class="subnav-btn active" data-subview="vocab">Vocabulario</button>
      <button class="subnav-btn" data-subview="lessons">Lecciones</button>
    </div>

    <div id="vocabView">
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar carácter, pinyin o traducción...">
        </div>
        <div class="lang-toggle" id="langToggle">
          <button class="lang-btn active" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="status-pill" id="statusPill">—</div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <div class="loading">
          <div class="spinner"></div>
          Cargando datos desde tu hoja de cálculo...
        </div>
      </div>
    </div>

    <div id="lessonsView" style="display:none;">
      <div class="lessons-grid" id="lessonsGrid"></div>
    </div>

    <div id="lessonGameView" style="display:none;"></div>
  </main>
</div>

<script>
/* =========================================================
   CONFIGURA AQUÍ tu Web App de Google Apps Script
   ========================================================= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwiL2ZZECKtpO_mrKkyi87W2IkPt0Por8ZmYPG4ZBpzjH453cdinbBIDTOSgp_xcks/exec";

const HSK_LEVELS = [1,2,3,4,5,6,'7-9'];
// El estándar HSK 3.0 usa 7 bandas: niveles 1 a 6 individuales,
// y 7, 8 y 9 agrupados en un solo bloque "HSK 7-9" (comparten el mismo
// vocabulario avanzado, ~5,600 palabras adicionales).

let RAW_DATA = {};      // { "1": [ {hanzi, pinyin, meaning}, ... ], "2": [...], "7-9": [...] }
let LESSONS = {};       // { "1": [ {id, titulo, categoria, palabras:[...]}, ... ] }
let PROGRESS = {};      // { "leccion_id": {completado, mejor_puntaje, fecha} }
let CURRENT_LEVEL = 1;
let CURRENT_LANG = localStorage.getItem('hsk_lang') || 'es';
let CURRENT_SUBVIEW = 'vocab'; // 'vocab' | 'lessons'
let ACTIVE_LESSON = null;
let LOAD_ERROR = null;

/* ---------------------------------------------------------
   Utilidades para detectar nombres de columnas automáticamente,
   sin importar si tu hoja usa español, inglés o pinyin en los headers.
   --------------------------------------------------------- */
const FIELD_PATTERNS = {
  character: /^(car[aá]cter|hanzi|chinese|palabra|word|字|汉字|简体)$/i,
  pinyin:    /^(pinyin|拼音)$/i,
  meaning:   /^(traducci[oó]n|significado|meaning|espa[nñ]ol|english|ingl[eé]s|意思|翻译)$/i,
  meaningEs: /^(traducci[oó]n_?es|traduccion_?espanol|traduccion_?spa|es|spanish)$/i,
  level:     /^(nivel|level|hsk|hsk_?level|等级)$/i
};

function findField(obj, patternKey){
  const pattern = FIELD_PATTERNS[patternKey];
  const keys = Object.keys(obj);
  const match = keys.find(k => pattern.test(k.trim()));
  return match ? obj[match] : undefined;
}

function normalizeLevelValue(v){
  if (v === undefined || v === null) return null;
  const s = String(v).trim().toUpperCase().replace(/^HSK\s*/,'').replace(/[_~]/g,'-');
  if (s === '7-9') return '7-9';
  const n = parseInt(s, 10);
  return isNaN(n) ? null : n;
}

/* ---------------------------------------------------------
   Normaliza la respuesta del Apps Script a nuestra forma interna,
   sin importar si viene como:
   a) Array plano de objetos con un campo de nivel
   b) Objeto { "1": [...], "2": [...] } o { "HSK1": [...], ... }
   c) Objeto envuelto en { data: [...] } o { rows: [...] }
   --------------------------------------------------------- */
function normalizeData(json){
  const result = {};
  HSK_LEVELS.forEach(l => result[l] = []);

  let arr = null;

  if (Array.isArray(json)){
    arr = json;
  } else if (json && Array.isArray(json.data)){
    arr = json.data;
  } else if (json && Array.isArray(json.rows)){
    arr = json.rows;
  } else if (json && typeof json === 'object'){
    // Puede ser objeto keyed por nivel: {"1":[...], "HSK2":[...]}
    const keys = Object.keys(json);
    const looksKeyed = keys.some(k => normalizeLevelValue(k) !== null);
    if (looksKeyed){
      keys.forEach(k => {
        const lvl = normalizeLevelValue(k);
        if (lvl && Array.isArray(json[k])){
          result[lvl] = json[k].map(rowToEntry).filter(Boolean);
        }
      });
      return result;
    }
  }

  if (arr){
    arr.forEach(row => {
      const entry = rowToEntry(row);
      if (!entry) return;
      const lvl = entry.level || normalizeLevelValue(findField(row, 'level'));
      if (lvl && result[lvl] !== undefined){
        result[lvl].push(entry);
      }
    });
    return result;
  }

  throw new Error("No se reconoció la estructura del JSON devuelto por el script.");
}

function rowToEntry(row){
  if (!row || typeof row !== 'object') return null;
  const character = findField(row, 'character');
  const pinyin = findField(row, 'pinyin');
  const meaning = findField(row, 'meaning');
  const meaningEs = findField(row, 'meaningEs');
  const level = normalizeLevelValue(findField(row, 'level'));
  if (!character && !pinyin && !meaning) return null;
  return {
    character: character ? String(character).trim() : '',
    pinyin: pinyin ? String(pinyin).trim() : '',
    meaning: meaning ? String(meaning).trim() : '',
    meaningEs: meaningEs ? String(meaningEs).trim() : '',
    level
  };
}

/* ---------------------------------------------------------
   Sidebar: construir botones de nivel
   --------------------------------------------------------- */
function buildSidebar(){
  const list = document.getElementById('levelList');
  list.innerHTML = '';
  HSK_LEVELS.forEach(level => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (String(level) === String(CURRENT_LEVEL) ? ' active' : '');
    btn.dataset.level = level;
    btn.innerHTML = `
      <span class="seal-tag" style="${String(level).length > 1 ? 'font-size:.72rem' : ''}">${level}</span>
      <span>HSK ${level}</span>
      <span class="count" data-count="${level}"></span>
    `;
    btn.addEventListener('click', () => selectLevel(level));
    li.appendChild(btn);
    list.appendChild(li);
  });
  updateCounts();
}

function updateCounts(){
  document.querySelectorAll('.count').forEach(el => {
    const lvl = el.getAttribute('data-count');
    const n = (RAW_DATA[lvl] || []).length;
    el.textContent = n ? n : '';
  });
}

function selectLevel(level){
  CURRENT_LEVEL = level;
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', String(b.dataset.level) === String(level));
  });
  document.getElementById('searchInput').value = '';
  CURRENT_SUBVIEW = 'vocab';
  updateSubNav();
  renderLevel();
  closeSidebarMobile();
}

/* ---------------------------------------------------------
   Sub-nav: Vocabulario / Lecciones
   --------------------------------------------------------- */
function updateSubNav(){
  document.querySelectorAll('.subnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.subview === CURRENT_SUBVIEW);
  });
  document.getElementById('vocabView').style.display = CURRENT_SUBVIEW === 'vocab' ? '' : 'none';
  document.getElementById('lessonsView').style.display = CURRENT_SUBVIEW === 'lessons' ? '' : 'none';
  document.getElementById('lessonGameView').style.display = 'none';
  if (CURRENT_SUBVIEW === 'lessons') renderLessonsGrid();
}

document.querySelectorAll('.subnav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    CURRENT_SUBVIEW = btn.dataset.subview;
    ACTIVE_LESSON = null;
    updateSubNav();
  });
});

function renderLessonsGrid(){
  const grid = document.getElementById('lessonsGrid');
  const lessons = LESSONS[CURRENT_LEVEL];

  if (!lessons || !lessons.length){
    grid.innerHTML = '';
    document.getElementById('lessonsView').innerHTML = `
      <div class="lessons-empty">
        Todavía no hay lecciones armadas para HSK ${CURRENT_LEVEL}.
        ${CURRENT_LEVEL == 1 ? 'Revisa que la pestaña "Lecciones_HSK1" esté en tu hoja de cálculo.' : 'Por ahora solo HSK 1 tiene lecciones — vamos agregando más niveles poco a poco.'}
      </div>`;
    return;
  }

  document.getElementById('lessonsView').innerHTML = `<div class="lessons-grid" id="lessonsGrid"></div>`;
  const freshGrid = document.getElementById('lessonsGrid');

  freshGrid.innerHTML = lessons.map(lesson => {
    const prog = PROGRESS[lesson.id];
    const done = prog && prog.completado;
    return `
      <div class="lesson-card" data-lesson-id="${lesson.id}">
        ${done ? '<div class="lesson-check">✓</div>' : ''}
        <div class="lesson-num">LECCIÓN ${lesson.id}</div>
        <h3>${escapeHtml(lesson.titulo)}</h3>
        <div class="lesson-meta">${lesson.palabras.length} palabras${prog && prog.mejor_puntaje ? ` · mejor: ${prog.mejor_puntaje}/${lesson.palabras.length}` : ''}</div>
      </div>
    `;
  }).join('');

  freshGrid.querySelectorAll('.lesson-card').forEach(card => {
    card.addEventListener('click', () => openLesson(card.dataset.lessonId));
  });
}

/* ---------------------------------------------------------
   Juego de arrastrar y emparejar
   --------------------------------------------------------- */
function shuffle(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function openLesson(lessonId){
  const lessons = LESSONS[CURRENT_LEVEL] || [];
  const lesson = lessons.find(l => String(l.id) === String(lessonId));
  if (!lesson) return;
  ACTIVE_LESSON = lesson;

  document.getElementById('lessonsView').style.display = 'none';
  document.getElementById('lessonGameView').style.display = '';
  renderMatchingGame(lesson);
}

function renderMatchingGame(lesson){
  const container = document.getElementById('lessonGameView');
  const palabras = lesson.palabras;
  const shuffledCards = shuffle(palabras.map((w, i) => ({ ...w, originalIndex: i })));

  container.innerHTML = `
    <div class="game-header">
      <button class="game-back" id="gameBackBtn">← Volver a lecciones</button>
      <div class="game-progress" id="gameProgress">0 de ${palabras.length} emparejadas</div>
    </div>
    <h2 style="font-family:'Noto Serif SC',serif;margin-bottom:4px;">${escapeHtml(lesson.titulo)}</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:20px;">Arrastra cada tarjeta con el pinyin y significado hacia su carácter correspondiente.</p>
    <div class="match-board">
      <div>
        <div class="match-col-title">Caracteres</div>
        <div id="slotsContainer"></div>
      </div>
      <div>
        <div class="match-col-title">Pinyin y significado</div>
        <div class="match-pool" id="poolContainer"></div>
      </div>
    </div>
  `;

  document.getElementById('gameBackBtn').addEventListener('click', () => {
    ACTIVE_LESSON = null;
    document.getElementById('lessonGameView').style.display = 'none';
    document.getElementById('lessonsView').style.display = '';
    renderLessonsGrid();
  });

  const slotsContainer = document.getElementById('slotsContainer');
  slotsContainer.innerHTML = palabras.map((w, i) => `
    <div class="match-slot" data-index="${i}">
      <div class="slot-hanzi">${escapeHtml(w.caracter)}</div>
      <div class="slot-drop-target" data-index="${i}"></div>
    </div>
  `).join('');

  const poolContainer = document.getElementById('poolContainer');
  poolContainer.innerHTML = shuffledCards.map(w => `
    <div class="match-card" data-index="${w.originalIndex}">
      <strong>${escapeHtml(w.pinyin)}</strong> — ${escapeHtml(w.significado)}
    </div>
  `).join('');

  let matchedCount = 0;
  let attempts = 0;
  const total = palabras.length;

  setupDragAndDrop(poolContainer, slotsContainer, (cardIndex, slotIndex, cardEl, slotEl) => {
    attempts++;
    if (cardIndex === slotIndex){
      const dropTarget = slotEl.querySelector('.slot-drop-target');
      cardEl.classList.add('placed');
      cardEl.style.cursor = 'default';
      cardEl.setAttribute('draggable', 'false');
      dropTarget.appendChild(cardEl);
      slotEl.classList.add('correct');
      matchedCount++;
      document.getElementById('gameProgress').textContent = `${matchedCount} de ${total} emparejadas`;

      if (matchedCount === total){
        const puntaje = Math.max(0, total - Math.max(0, attempts - total));
        setTimeout(() => showLessonComplete(lesson, puntaje, total), 350);
      }
      return true; // aceptar
    } else {
      slotEl.classList.add('shake');
      setTimeout(() => slotEl.classList.remove('shake'), 300);
      return false; // rechazar, la tarjeta regresa
    }
  });
}

function showLessonComplete(lesson, puntaje, total){
  const container = document.getElementById('lessonGameView');
  container.innerHTML = `
    <div class="lesson-complete">
      <div class="big-check">✓</div>
      <h2>¡Lección completada!</h2>
      <p>${escapeHtml(lesson.titulo)} — ${puntaje} de ${total} puntos</p>
      <button id="backToLessonsBtn">Volver a lecciones</button>
    </div>
  `;
  document.getElementById('backToLessonsBtn').addEventListener('click', () => {
    ACTIVE_LESSON = null;
    container.style.display = 'none';
    document.getElementById('lessonsView').style.display = '';
    renderLessonsGrid();
  });

  PROGRESS[lesson.id] = {
    completado: true,
    mejor_puntaje: Math.max(puntaje, (PROGRESS[lesson.id] && PROGRESS[lesson.id].mejor_puntaje) || 0),
    fecha: new Date().toISOString()
  };
  guardarProgresoRemoto(lesson.id, true, puntaje);
}

async function guardarProgresoRemoto(leccionId, completado, puntaje){
  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita el preflight de CORS
      body: JSON.stringify({ accion: 'guardar_progreso', leccion_id: leccionId, completado, puntaje })
    });
  } catch(err){
    console.warn('No se pudo guardar el progreso en la hoja:', err);
  }
}

/**
 * Drag & drop con Pointer Events (funciona con mouse y con touch por igual).
 * onDrop(cardIndex, slotIndex, cardEl, slotEl) debe devolver true/false.
 */
function setupDragAndDrop(poolContainer, slotsContainer, onDrop){
  let dragEl = null;
  let ghost = null;
  let originParent = null;
  let offsetX = 0, offsetY = 0;

  function pointerDown(e){
    const card = e.target.closest('.match-card');
    if (!card || card.classList.contains('placed')) return;
    e.preventDefault();
    dragEl = card;
    originParent = card.parentElement;

    const rect = card.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    ghost = card.cloneNode(true);
    ghost.classList.add('dragging-ghost');
    ghost.style.width = rect.width + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);
    card.style.opacity = '0.3';

    document.addEventListener('pointermove', pointerMove);
    document.addEventListener('pointerup', pointerUp);
  }

  function pointerMove(e){
    if (!ghost) return;
    ghost.style.left = (e.clientX - offsetX) + 'px';
    ghost.style.top = (e.clientY - offsetY) + 'px';
  }

  function pointerUp(e){
    document.removeEventListener('pointermove', pointerMove);
    document.removeEventListener('pointerup', pointerUp);
    if (!ghost) return;

    ghost.style.display = 'none';
    const dropEl = document.elementFromPoint(e.clientX, e.clientY);
    ghost.remove();
    ghost = null;

    if (dragEl) dragEl.style.opacity = '';

    const slotTarget = dropEl ? dropEl.closest('.match-slot') : null;

    if (slotTarget && dragEl){
      const cardIndex = Number(dragEl.dataset.index);
      const slotIndex = Number(slotTarget.dataset.index);
      const accepted = onDrop(cardIndex, slotIndex, dragEl, slotTarget);
      if (!accepted){
        originParent.appendChild(dragEl);
      }
    }
    dragEl = null;
  }

  poolContainer.addEventListener('pointerdown', pointerDown);
  slotsContainer.addEventListener('pointerdown', (e) => {
    // permite re-arrastrar una tarjeta ya colocada mal (por si acaso)
    pointerDown(e);
  });
}

/* ---------------------------------------------------------
   Render de tabla
   --------------------------------------------------------- */
const SAMPLE_HANZI = {1:'一',2:'二',3:'三',4:'四',5:'五',6:'六','7-9':'高'};

function renderLevel(){
  const words = RAW_DATA[CURRENT_LEVEL] || [];
  document.getElementById('bigHanzi').textContent = SAMPLE_HANZI[CURRENT_LEVEL] || CURRENT_LEVEL;
  document.getElementById('levelTitle').textContent = `HSK ${CURRENT_LEVEL}`;
  document.getElementById('levelSubtitle').textContent =
    words.length ? `${words.length} palabras en este nivel` : 'Sin datos para este nivel todavía';

  renderTable(words);
}

function getMeaning(w){
  if (CURRENT_LANG === 'es' && w.meaningEs) return w.meaningEs;
  if (CURRENT_LANG === 'es' && !w.meaningEs) return w.meaning; // aún no traducido, cae a inglés
  return w.meaning;
}

function renderTable(words){
  const wrap = document.getElementById('tableWrap');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = query
    ? words.filter(w =>
        w.character.toLowerCase().includes(query) ||
        w.pinyin.toLowerCase().includes(query) ||
        w.meaning.toLowerCase().includes(query) ||
        (w.meaningEs && w.meaningEs.toLowerCase().includes(query)))
    : words;

  document.getElementById('statusPill').textContent =
    `${filtered.length} de ${words.length} palabras`;

  if (!filtered.length){
    wrap.innerHTML = `<div class="empty">No se encontraron resultados para este nivel.</div>`;
    return;
  }

  const rows = filtered.map((w, i) => {
    const pendingEs = CURRENT_LANG === 'es' && !w.meaningEs;
    return `
    <tr>
      <td class="idx">${i + 1}</td>
      <td class="hanzi">${escapeHtml(w.character)}</td>
      <td class="pinyin">${escapeHtml(w.pinyin)}</td>
      <td class="meaning">${escapeHtml(getMeaning(w))}${pendingEs ? ' <span style="color:var(--muted);font-size:.72rem">(en)</span>' : ''}</td>
    </tr>
  `;
  }).join('');

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Carácter</th>
          <th>Pinyin</th>
          <th>Traducción</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---------------------------------------------------------
   Carga de datos
   --------------------------------------------------------- */
async function loadData(){
  try{
    const res = await fetch(SCRIPT_URL, { method: 'GET' });
    if (!res.ok) throw new Error(`El script respondió con estado ${res.status}`);
    const json = await res.json();

    // Compatibilidad: si el script todavía es la versión vieja (sin
    // envoltura vocabulario/lecciones), lo tratamos como solo vocabulario.
    const vocabJson = json && json.vocabulario ? json.vocabulario : json;
    RAW_DATA = normalizeData(vocabJson);
    LESSONS = (json && json.lecciones) ? json.lecciones : {};
    PROGRESS = (json && json.progreso) ? json.progreso : {};

    updateCounts();
    renderLevel();
  } catch(err){
    LOAD_ERROR = err;
    showLoadError(err);
  }
}

function showLoadError(err){
  const wrap = document.getElementById('tableWrap');
  document.getElementById('levelSubtitle').textContent = 'No se pudieron cargar los datos';
  document.getElementById('statusPill').textContent = 'Error de carga';
  wrap.innerHTML = `
    <div class="error">
      <strong>No pude leer el vocabulario desde tu script.</strong>
      <p style="margin-top:8px;font-size:.85rem;color:var(--ink-soft)">
        Revisa que la Web App esté publicada con acceso "Cualquier usuario", y que
        el <code>doGet()</code> devuelva JSON con <code>ContentService</code>
        (no HTML). Detalle técnico:
      </p>
      <pre>${escapeHtml(err.message || err)}</pre>
    </div>
  `;
}

});

  });
});
